name: Daily Refresh

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC daily — ~03:00 AEST
    - cron: '0 17 * * *'

permissions:
  contents: write

jobs:
  refresh:
    name: Scrape, commit, release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scrape + regenerate corpus
        run: |
          bun scripts/Scrape.ts
          bun scripts/BuildLens.ts
          bun scripts/BuildBundle.ts

      - name: Verify acceptance criteria
        run: bun scripts/Verify.ts

      - name: Commit changes
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
          else
            git add data/
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cut release if content changed
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/BuildRelease.ts
